name: music_app
description: "VibeStream is a Flutter music player for local audio, YouTube playback, and media downloads."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  audio_service: ^0.18.18
  audio_session: ^0.2.3
  audio_video_progress_bar: ^2.0.3
  cached_network_image: ^3.4.1
  file_picker: ^11.0.0
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  flutter_riverpod: ^3.3.1
  get_it: ^9.2.1
  google_fonts: ^8.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.2
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.17
  on_audio_query: ^2.9.0
  palette_generator: ^0.3.3+7
  path_provider: ^2.1.4
  permission_handler: ^12.0.1
  share_plus: ^12.0.2
  video_player: ^2.11.1
  youtube_explode_dart: ^3.0.5
  youtube_player_flutter: ^9.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/vibestream_icon.png
  min_sdk_android: 21
